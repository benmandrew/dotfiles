# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

format = "$all$fill$os$time$line_break$character"

[directory]
format = '[\[$path\]]($style)'
read_only = " ≤░Ν╛"

[character] # The name of the module we are configuring is 'character'
success_symbol = '[\$](bold green)' # The 'success_symbol' segment is being set to 'έηε' with the color 'bold green'
error_symbol = '[\$](bold red)'

[git_branch]
symbol = "ΎΡα "
style = "purple"
format = '[\[$branch(:$remote_branch)\]]($style)'

[git_status]
style = "red"
format = '([\[$all_status\]]($style))'
conflicted = ''
ahead = ''
behind = ''
diverged = ''

[time]
style ="yellow"
format = '[\[$time\]]($style)'
disabled = false

[fill]
symbol = ' '

[cmd_duration]
disabled = true

[battery]
disabled = true


# Disable the package module, hiding it from the prompt completely
[package]
disabled = true
symbol = "≤░ΠΩ "

[aws]
disabled = true
symbol = "ΌΝ╜ "

[buf]
symbol = "ΎΤζ "

