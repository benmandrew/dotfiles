name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stylua
        uses: taiki-e/install-action@v2
        with:
          tool: stylua

      - name: Install shfmt
        uses: taiki-e/install-action@v2
        with:
          tool: shfmt

      - name: Format check
        run: make fmt-ci

      - name: Install actionlint
        uses: taiki-e/install-action@v2
        with:
          tool: actionlint

      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck luarocks
          sudo luarocks install luacheck

      - name: Lint check
        run: make lint

  install:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache installed tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/.oh-my-zsh
            ~/.fzf
            ~/.local
            ~/.tmux
            ~/.config/tmux/plugins
            /opt/nvim-linux-x86_64
            /usr/local/bin
            /usr/local/lib/node_modules
          key: install-${{ runner.os }}-${{ hashFiles('scripts/install-common.sh', 'scripts/install-ubuntu-x86_64.sh') }}

      - name: Run install script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/install-ubuntu-x86_64.sh

      - name: Verify installed tools
        run: bash scripts/verify-install.sh
