name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      install: ${{ steps.filter.outputs.install }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for install script changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            install:
              - 'scripts/install-common.sh'
              - 'scripts/install-linux.sh'
              - 'scripts/verify-install.sh'

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Format check
        run: nix develop --command make fmt-ci

      - name: Lint check
        run: nix develop --command make lint

  install:
    runs-on: ubuntu-latest
    needs: [lint, changes]
    if: needs.changes.outputs.install == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache installed tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            ~/.rustup
            ~/.local/share/zinit
            ~/.fzf
            ~/.local
            ~/.tmux
            ~/.config/tmux/plugins
            /opt/nvim-linux-x86_64
            /usr/local/bin
            /usr/local/lib/node_modules
          key: install-${{ runner.os }}-${{ hashFiles('scripts/install-common.sh', 'scripts/install-linux.sh') }}

      - name: Run install script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/install-linux.sh

      - name: Verify installed tools
        run: bash scripts/verify-install.sh
